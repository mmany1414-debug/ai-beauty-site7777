<!DOCTYPE html>
<html lang="ar" dir="rtl" id="mainHtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI BEAUTY | الإمبراطورية الرقمية</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --gold: #D4AF37;
            --black: #050505;
            --glass: rgba(255, 255, 255, 0.07);
            --border: rgba(212, 175, 55, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }

        body { 
            font-family: 'Tajawal', sans-serif; 
            background-color: var(--black);
            color: #fff;
            overflow-x: hidden;
            line-height: 1.6;
        }

        #particles-js {
            position: fixed;
            width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .container { max-width: 1300px; margin: 0 auto; padding: 0 20px; }

        header {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            padding: 15px 0;
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }

        .nav-container { display: flex; justify-content: space-between; align-items: center; }
        .nav-links { display: flex; gap: 20px; list-style: none; align-items: center; }
        .nav-links a { color: #fff; text-decoration: none; font-weight: 700; transition: 0.3s; }
        .nav-links a:hover { color: var(--gold); }

        .btn-lang, .btn-login {
            background: transparent; border: 1px solid var(--gold);
            color: var(--gold); padding: 5px 15px; border-radius: 20px;
            cursor: pointer; font-weight: 700; font-family: 'Tajawal';
        }

        .hero-logo { text-align: center; padding: 60px 0 30px; }
        .hero-logo h1 {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 900;
            background: linear-gradient(to bottom, #fff, var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .badge-item {
            display: inline-block; padding: 10px 25px;
            border: 1px solid var(--gold); border-radius: 50px;
            color: var(--gold); text-decoration: none; font-weight: 700;
            background: rgba(212, 175, 55, 0.1); transition: 0.3s;
        }
        .badge-item:hover { background: var(--gold); color: #000; box-shadow: 0 0 15px var(--gold); }

        .services-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px; padding: 40px 0;
        }

        .service-card {
            background: var(--glass); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 30px; text-align: center;
            transition: 0.4s; cursor: pointer; backdrop-filter: blur(10px);
        }
        .service-card:hover { transform: translateY(-10px); border-color: var(--gold); }
        .service-card i { font-size: 2.5rem; color: var(--gold); margin-bottom: 15px; }

        /* قسم صوت العميل */
        .feedback-section { padding: 60px 0; }
        .feedback-form {
            max-width: 600px; margin: 0 auto;
            background: var(--glass); padding: 35px;
            border-radius: 25px; border: 1px solid var(--border);
        }
        .form-group { margin-bottom: 15px; text-align: right; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--gold); font-weight: 700; }
        .form-control {
            width: 100%; padding: 12px;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            border-radius: 10px; color: #fff; font-family: 'Tajawal'; outline: none;
        }

        .submit-btn {
            width: 100%; padding: 15px; background: var(--gold);
            color: #000; border: none; border-radius: 10px;
            font-weight: 900; cursor: pointer; transition: 0.3s; font-family: 'Tajawal';
        }

        /* آراء العملاء - الشكل البلوري */
        .testimonials-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px; padding: 40px 0;
        }
        .testimonial-card {
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 20px; padding: 25px; backdrop-filter: blur(10px);
            animation: fadeIn 0.5s ease-in;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .stars { color: var(--gold); margin-bottom: 10px; }
        .client-name { color: var(--gold); font-weight: 900; display: block; margin-top: 10px; }

        .modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            z-index: 2000; align-items: center; justify-content: center;
        }
        .modal-content {
            background: var(--black); border: 1px solid var(--gold);
            padding: 30px; border-radius: 20px; max-width: 500px; width: 90%; text-align: center;
        }

        footer { padding: 40px 0; border-top: 1px solid var(--border); text-align: center; }
        .social-box a { font-size: 1.5rem; color: #fff; margin: 0 10px; }

        [lang="en"] .ar-text { display: none; }
        [lang="ar"] .en-text { display: none; }
    </style>
</head>
<body id="bodyTag">

    <div id="particles-js"></div>

    <header>
        <div class="container nav-container">
            <div class="logo-small"><h2 style="color:var(--gold);">AI BEAUTY</h2></div>
            <ul class="nav-links">
                <li><a href="#services"><span class="ar-text">الخدمات</span><span class="en-text">Services</span></a></li>
                <li><a href="#testimonials"><span class="ar-text">آراء النخبة</span><span class="en-text">Reviews</span></a></li>
                <button class="btn-lang" onclick="toggleLang()">English</button>
                <button class="btn-login" onclick="openLogin()"><span class="ar-text">دخول</span><span class="en-text">Login</span></button>
            </ul>
        </div>
    </header>

    <div class="hero-logo">
        <h1>AI BEAUTY</h1>
        <div class="trust-badge">
            <a href="https://wa.me/963956227556" class="badge-item">
                <i class="fab fa-whatsapp"></i> <span class="ar-text">احجز استشارتك</span><span class="en-text">Book Now</span>
            </a>
        </div>
    </div>

    <section class="container" id="services">
        <div class="services-grid">
            <div class="service-card" onclick="openModal('web')">
                <i class="fas fa-code"></i>
                <h3><span class="ar-text">المواقع الذكية</span><span class="en-text">Web Design</span></h3>
            </div>
            <div class="service-card" onclick="openModal('beauty')">
                <i class="fas fa-magic"></i>
                <h3><span class="ar-text">مراكز التجميل</span><span class="en-text">Beauty Centers</span></h3>
            </div>
            <div class="service-card" onclick="openModal('fashion')">
                <i class="fas fa-crown"></i>
                <h3><span class="ar-text">عالم الموضة</span><span class="en-text">Fashion AI</span></h3>
            </div>
        </div>
    </section>

    <section class="container feedback-section" id="feedback">
        <div class="feedback-form">
            <h2 style="text-align:center; color:var(--gold); margin-bottom:20px;">
                <span class="ar-text">صوت العميل</span><span class="en-text">Customer Voice</span>
            </h2>
            <form id="contactForm" action="https://formspree.io/f/mqakpree" method="POST">
                <input type="hidden" name="_subject" value="إقتراح جديد من موقع AI BEAUTY">
                <input type="hidden" name="_replyto" id="hiddenEmail" value="mmany1414@gmail.com">
                
                <div class="form-group">
                    <label><span class="ar-text">الاسم الكامل</span><span class="en-text">Full Name</span></label>
                    <input type="text" name="name" class="form-control" id="clientName" required>
                </div>
                <div class="form-group">
                    <label><span class="ar-text">نوع الرسالة</span><span class="en-text">Type</span></label>
                    <select name="type" class="form-control" id="msgType">
                        <option value="رأي">رأي</option>
                        <option value="اقتراح">اقتراح</option>
                        <option value="شكوى">شكوى</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><span class="ar-text">رسالتك</span><span class="en-text">Message</span></label>
                    <textarea name="message" class="form-control" id="clientMsg" rows="4" required></textarea>
                </div>
                <button type="submit" class="submit-btn">
                    <span class="ar-text">إرسال وإضافة للموقع</span><span class="en-text">Send & Post</span>
                </button>
            </form>
        </div>
    </section>

    <section class="container" id="testimonials">
        <h2 style="text-align:center; margin-bottom:30px; color:var(--gold);">
            <span class="ar-text">آراء <span style="color:#fff;">النخبة</span></span>
            <span class="en-text">Elite <span style="color:#fff;">Reviews</span></span>
        </h2>
        <div class="testimonials-grid" id="testimonialsGrid">
            <div class="testimonial-card">
                <div class="stars">★★★★★</div>
                <p>"تجربة استثنائية، التصاميم تفوق الخيال."</p>
                <span class="client-name">سيف المنصور</span>
            </div>
        </div>
    </section>

    <footer>
        <div class="social-box">
            <a href="https://wa.me/963956227556"><i class="fab fa-whatsapp"></i></a>
            <a href="#"><i class="fab fa-facebook"></i></a>
        </div>
        <p style="margin-top:20px; opacity:0.5;">&copy; 2026 AI BEAUTY</p>
    </footer>

    <div class="modal" id="infoModal">
        <div class="modal-content">
            <h2 id="mTitle" style="color:var(--gold)"></h2>
            <p id="mDesc" style="margin:15px 0"></p>
            <button class="submit-btn" onclick="closeModal()">إغلاق</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // إعداد الجسيمات
        particlesJS('particles-js', {
            "particles": {
                "number": { "value": 60 },
                "color": { "value": "#D4AF37" },
                "size": { "value": 2 },
                "line_linked": { "enable": true, "opacity": 0.1 },
                "move": { "enable": true, "speed": 1 }
            }
        });

        // لغة الموقع
        let currentLang = 'ar';
        function toggleLang() {
            const html = document.getElementById('mainHtml');
            currentLang = currentLang === 'ar' ? 'en' : 'ar';
            html.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            html.lang = currentLang;
            document.querySelector('.btn-lang').innerText = currentLang === 'ar' ? 'English' : 'العربية';
        }

        // التعامل مع النموذج: إرسال الإيميل وحفظ الرأي
        const contactForm = document.getElementById('contactForm');
        contactForm.addEventListener('submit', function(e) {
            e.preventDefault(); // منع الصفحة من إعادة التحميل

            const name = document.getElementById('clientName').value;
            const msg = document.getElementById('clientMsg').value;
            const type = document.getElementById('msgType').value;

            // 1. إرسال البيانات إلى الإيميل عبر Formspree
            const formData = new FormData(this);
            fetch(this.action, {
                method: 'POST',
                body: formData,
                headers: { 'Accept': 'application/json' }
            }).then(response => {
                if (response.ok) {
                    alert('تم إرسال اقتراحك للإدارة وسيظهر الآن على الموقع!');
                }
            });

            // 2. إضافة الرأي فوراً للشبكة البلورية
            if(type === 'رأي' || type === 'اقتراح') {
                addTestimonialToUI(name, msg);
                saveTestimonial(name, msg);
            }

            this.reset();
        });

        function addTestimonialToUI(name, msg) {
            const grid = document.getElementById('testimonialsGrid');
            const card = document.createElement('div');
            card.className = 'testimonial-card';
            card.innerHTML = `
                <div class="stars">★★★★★</div>
                <p>"${msg}"</p>
                <span class="client-name">${name}</span>
            `;
            grid.prepend(card); // إضافة في البداية
        }

        // حفظ في ذاكرة المتصفح ليظل موجوداً عند تحديث الصفحة
        function saveTestimonial(name, msg) {
            let list = JSON.parse(localStorage.getItem('myReviews') || "[]");
            list.push({name, msg});
            localStorage.setItem('myReviews', JSON.stringify(list));
        }

        // تحميل الآراء المحفوظة عند فتح الموقع
        window.onload = function() {
            let list = JSON.parse(localStorage.getItem('myReviews') || "[]");
            list.forEach(item => addTestimonialToUI(item.name, item.msg));
        };

        function openModal(service) {
            document.getElementById('mTitle').innerText = "AI BEAUTY";
            document.getElementById('mDesc').innerText = "نقدم حلولاً رقمية ذكية تناسب تطلعاتكم.";
            document.getElementById('infoModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('infoModal').style.display = 'none'; }
        function openLogin() { alert('قريباً: بوابة العملاء الخاصة'); }
    </script>
</body>
</html>
